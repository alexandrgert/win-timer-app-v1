name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries (Qt / PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-x11-0 libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libfontconfig1 libx11-6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  build-deb:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev \
            libxkbcommon-x11-0 libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-xinerama0 libfontconfig1 libx11-6

      - name: Read package version
        run: |
          echo "PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_ENV"

      - name: Build amd64 .deb
        run: |
          python -m venv .venv
          export VERSION="$PACKAGE_VERSION"
          ALLOW_NO_BUMP=1 NO_BUMP=1 ./build_deb.sh

      - uses: actions/upload-artifact@v5
        with:
          name: deb-amd64
          path: dist/tasktimer-link-b24-*-amd64.deb
          if-no-files-found: error

  build-exe:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Read package version
        run: |
          echo "PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_ENV"

      - name: Build win64 .exe
        shell: pwsh
        run: |
          python -m venv .venv
          $env:VERSION = $env:PACKAGE_VERSION
          $env:NO_BUMP = "1"
          .\build_exe.ps1

      - uses: actions/upload-artifact@v5
        with:
          name: exe-win64
          path: dist/tasktimer-link-b24-*-win64.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Read package version
        run: |
          echo "PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_ENV"

      - name: Build macOS .app zip
        run: |
          python3 -m venv .venv
          export VERSION="$PACKAGE_VERSION"
          export NO_BUMP=1
          ./build_macos.sh

      - uses: actions/upload-artifact@v5
        with:
          name: macos-zip
          path: dist/tasktimer-link-b24-*-macos-*.zip
          if-no-files-found: error

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Verify Android version matches pyproject.toml
        run: python scripts/check_version_sync.py

      - name: Build Android APK
        run: |
          chmod +x build_apk.sh
          ./build_apk.sh

      - uses: actions/upload-artifact@v5
        with:
          name: apk-android
          path: dist/tasktimer-link-b24-*-android.apk
          if-no-files-found: error
